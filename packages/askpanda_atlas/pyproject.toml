[project]
name = "askpanda_atlas"
version = "1.0.2"
requires-python = ">=3.10"
dependencies = [
  "requests>=2.0",
  "duckdb>=0.10",
  "sqlglot>=23.0",
]

[project.entry-points."bamboo.tools"]
"atlas.task_status" = "askpanda_atlas.task_status:panda_task_status_tool"
"atlas.log_analysis" = "askpanda_atlas.log_analysis:panda_log_analysis_tool"
"atlas.ui_manifest" = "askpanda_atlas.ui_manifest:atlas_ui_manifest_tool"
"atlas.jobs_query" = "askpanda_atlas.jobs_query:panda_jobs_query_tool"
"atlas.harvester_workers" = "askpanda_atlas.harvester_worker:panda_harvester_workers_tool"
"atlas.panda_server_health" = "askpanda_atlas.panda_server_health:panda_server_health_tool"
"atlas.cric_query" = "askpanda_atlas.cric_query:cric_query_tool"
"atlas.doc_search" = "askpanda_atlas.doc_rag:atlas_doc_search_tool"
"atlas.doc_bm25" = "askpanda_atlas.doc_bm25:atlas_doc_bm25_tool"

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["askpanda_atlas"]
